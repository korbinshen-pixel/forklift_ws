# =============================================================================
# 仓库静态地图描述文件
# 地图尺寸: 20m x 20m
# 分辨率: 0.05m/像素 => 400 x 400 像素
# 坐标原点: 地图左下角
# =============================================================================

image: warehouse_map.pgm     # PGM灰度图文件路径（相对于此yaml文件）
resolution: 0.05             # 分辨率：每像素代表0.05m
origin: [-10.0, -10.0, 0.0] # 地图原点在世界坐标系中的位置 [x, y, yaw]
                             # 设置为 (-10, -10) 使地图中心对齐世界原点

negate: 0                    # 是否反转像素值 (0=不反转: 白色=空闲, 黑色=障碍)
occupied_thresh: 0.65        # 像素值低于此阈值视为障碍 (占用概率 > 0.65)
free_thresh: 0.25            # 像素值高于此阈值视为空闲 (占用概率 < 0.25)

# 地图模式: trinary（三态：空闲/未知/障碍）
mode: trinary
